# @package _global_

# to execute this experiment run:
# python run.py experiment=cnn_spatial_cls

defaults:
  - override /trainer: default.yaml # choose trainer from 'configs/trainer/'
  - override /model: greecefire_ResNet18_model.yaml
  - override /datamodule: fireds_spatial_datamodule.yaml
  - override /callbacks: default.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

logger:
  wandb:
    name: ${oc.env:WANDB_NAME_PREFIX}_ResNet18_opt_${now:%Y%m%d_%H%M}

model:
  hidden_size: 32
  positive_weight: 0.7
  lr: 0.0003
  lr_scheduler_step: 15
  lr_scheduler_gamma: 0.5
  weight_decay: 0.0005
  dropout: 0.3
  freeze_backbone: False
  clc: ${clc}

datamodule:
  batch_size: 256
  num_workers: 8
  pin_memory: False
  access_mode: "spatial"
  problem_class: "classification"
  nan_fill: -1.0
  clc: ${clc}

trainer:
  max_epochs: 1
